name: Update EOL Versions

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run EOL version updater
        run: node scripts/update-versions-from-eol.js

      - name: Open pull request if versions changed
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/update-eol-versions
          # Delete the branch after merging so next run starts fresh
          delete-branch: true
          commit-message: "chore: update EOL dates from endoflife.date"
          title: "chore: update EOL dates from endoflife.date"
          body: |
            Automated update of EOL dates in `src/versions.ts`.

            Dates were fetched and compared against the values currently in the file.

            Please review the diff before merging.
          labels: dependencies, automated
